<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Gradient for crystal effect -->
    <linearGradient id="crystalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8172B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D5A9E;stop-opacity:1" />
    </linearGradient>
    <!-- Highlight gradient -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Main crystal body - elongated hexagon -->
  <polygon
    points="128,16 200,64 200,192 128,240 56,192 56,64"
    fill="url(#crystalGradient)"
    stroke="#4A5568"
    stroke-width="4"
  />

  <!-- Left facet -->
  <polygon
    points="128,16 56,64 56,192 128,128"
    fill="#9F7AEA"
    opacity="0.3"
  />

  <!-- Top highlight -->
  <polygon
    points="128,16 200,64 128,88 56,64"
    fill="url(#highlightGradient)"
  />

  <!-- Center line detail -->
  <line x1="128" y1="16" x2="128" y2="240" stroke="#6D5A9E" stroke-width="2" opacity="0.5"/>

  <!-- Facet lines -->
  <line x1="56" y1="64" x2="128" y2="128" stroke="#6D5A9E" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="64" x2="128" y2="128" stroke="#6D5A9E" stroke-width="2" opacity="0.4"/>
  <line x1="56" y1="192" x2="128" y2="128" stroke="#6D5A9E" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="192" x2="128" y2="128" stroke="#6D5A9E" stroke-width="2" opacity="0.4"/>
</svg>
