<!DOCTYPE html>
<html>
<head>
    <title>PokeAgent Challenge - Speedrun</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        html, body {
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;

        }
        
        .header-title {
            color: #33ff33;

        }
        
        .content {
            display: flex;
            height: 1020px;

            gap: 10px;

        .game-panel {
            width: 895px;

            display: flex;
            flex-direction: column;

            border-radius: 0;

            width: 895px;

            overflow: hidden;

        }

        .frame {
            width: 100%;
            height: 100%;
            object-fit: fill;
            image-rendering: pixelated;
        }
        
        .milestones {
            padding: 15px;
            background-color: #1a1a1a;

        .milestone-title {

        .brain-panel {

<body>
    <div class="header">
        <div class="header-logo">PokeAgent Challenge //</div>
        <div class="header-title">PROTOCOL_EMERALD // AGENT = PLAYER</div>
        <div style="flex: 1;"></div>
        <div id="metrics-display" style="color: #33ff33; margin-right: 20px; font-size: 14px;">
            <span id="cost-metric">Cost: $0.00</span> |
            <span id="tokens-metric">0 tokens</span> |
            <span id="actions-metric">Actions: 0</span> |
            <span id="time-metric">Time: 00:00:00</span>
        </div>
        <div style="width: 10px; height: 10px; background-color: #33ff33; border-radius: 50%; box-shadow: 0 0 10px #33ff33;"></div>
    </div>
    
    <div class="content">
        <div class="game-panel">
            <div class="frame-container">
                <img id="frame" class="frame" src="" alt="Game Frame">
            </div>
            
                        <div class="milestones">
                <div class="milestone-title">
                    <span class="milestone-icon">■</span>
                    <span>SYSTEM.LOG - RECENT MILESTONES</span>
                    <div class="milestone-progress">
                        <div id="milestone-progress-fill" class="milestone-progress-fill" style="width: 0%"></div>
                    </div>
                    <span id="milestone-count" class="milestone-count">0/0</span>
                </div>
                <div class="milestones-container">
                <div id="milestones-list">
                    <!-- Milestones will be added here -->
                    </div>
                </div>
            </div>
            
            <div class="party-box-section">
                <div class="section-title"># PARTY</div>
                <div id="party-horizontal" class="party-horizontal">
                    <!-- Pokemon party will appear here -->
                </div>
            </div>
        </div>
        
        <div class="brain-panel">
            <div class="brain-section">
                <div class="section-title"># AGENT_THINKING</div>
                <div id="agent-thinking" class="agent-thinking">INITIALIZING AGENT...</div>
            </div>

            <div class="brain-section">
                <div class="section-title">◈ MAP & ACTIONS</div>
                <div class="combined-container">
                    <div class="map-section">
                        <div class="subsection-title">MAP</div>
                        <div id="map-visualization" class="map-visualization">LOADING MAP...</div>
                    </div>
                    <div class="party-section">
                        <div class="subsection-title">ACTION QUEUE</div>
                        <div id="action-queue" class="action-queue">
                            <!-- Action queue buttons will appear here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false;
        let frameWebSocket = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;

        // Detect server address dynamically
        const serverPort = window.location.port || '8000';

        const serverUrl = `http://${window.location.hostname}:${serverPort}`;
        // WebSocket URL (use ws:// instead of http://)
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const frameWebSocketUrl = `${wsProtocol}//${window.location.hostname}:${serverPort}/ws/frames`;

        console.log(`Using server URL: ${serverUrl}`);
        console.log(`Using WebSocket URL: ${frameWebSocketUrl}`);

        // WebSocket frame streaming (REAL-TIME PUSH - no polling!)
        function connectFrameWebSocket() {
            try {
                frameWebSocket = new WebSocket(frameWebSocketUrl);

                frameWebSocket.onopen = function() {
                    console.log('🚀 WebSocket connected for frame streaming');
                    isConnected = true;
                    reconnectAttempts = 0;
                    document.querySelector('.header div[style*="background-color"]').style.backgroundColor = '#33ff33';

                    // Send periodic ping to keep connection alive
                    setInterval(() => {
                        if (frameWebSocket.readyState === WebSocket.OPEN) {
                            frameWebSocket.send('ping');
                        }
                    }, 30000); // Ping every 30 seconds
                };

                frameWebSocket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.frame_data) {
                            document.getElementById('frame').src = `data:image/png;base64,${data.frame_data}`;
                        }
                    } catch (error) {
                        console.error('Error parsing frame data:', error);
                    }
                };

                frameWebSocket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    isConnected = false;
                    document.querySelector('.header div[style*="background-color"]').style.backgroundColor = '#ff6177';
                };

                frameWebSocket.onclose = function() {
                    console.log('WebSocket disconnected');
                    isConnected = false;
                    document.querySelector('.header div[style*="background-color"]').style.backgroundColor = '#ff6177';

                    // Attempt to reconnect with exponential backoff
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000); // Max 30 seconds
                        console.log(`Reconnecting in ${delay/1000}s (attempt ${reconnectAttempts}/${maxReconnectAttempts})...`);
                        setTimeout(connectFrameWebSocket, delay);
                    } else {
                        console.error('Max reconnection attempts reached. Please refresh the page.');
                    }
                };
            } catch (error) {
                console.error('Failed to create WebSocket:', error);
            }
        }
        
        // Function to format time from seconds to HH:MM:SS
        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }
        
        // Track session start time for continuous timer
        let sessionStartTime = null;
        let savedRunTime = 0;
        let lastMetricsUpdate = null;

        // Function to update metrics display
        async function updateMetrics() {
            try {
                const response = await fetch(`${serverUrl}/metrics`);
                if (response.ok) {
                    const metrics = await response.json();

                    const cost = metrics.total_cost || 0;
                    document.getElementById('cost-metric').textContent = `Cost: $${cost.toFixed(4)}`;
                    const tokens = metrics.total_tokens || 0;
                    document.getElementById('tokens-metric').textContent = `${tokens.toLocaleString()} tokens`;
                    const actions = metrics.total_actions || 0;
                    document.getElementById('actions-metric').textContent = `Actions: ${actions.toLocaleString()}`;

                    // Initialize time tracking on first load
                    if (!sessionStartTime) {
                        // Get the cumulative run time from server
                        savedRunTime = metrics.total_run_time || 0;
                        // Start the local timer from now
                        sessionStartTime = Date.now();

                        console.log('Initialized cumulative metrics from server:', {
                            totalCost: metrics.total_cost,
                            totalTokens: metrics.total_tokens,
                            totalActions: metrics.total_actions,
                            savedRunTime: savedRunTime,
                            formattedTime: formatTime(savedRunTime)
                        });
                    } else {
                        // On subsequent updates, sync with server's total_run_time
                        // Only sync if there's a significant change (>5 seconds difference)
                        // This means the agent actually ran and updated the time
                        const serverRunTime = metrics.total_run_time || 0;
                        const currentLocalTime = savedRunTime + Math.floor((Date.now() - sessionStartTime) / 1000);
                        const timeDiff = Math.abs(serverRunTime - currentLocalTime);

                        if (timeDiff > 5) {
                            // Significant difference - server updated, sync with it
                            console.log(`Syncing time: server=${serverRunTime}s, local=${currentLocalTime}s, diff=${timeDiff}s`);
                            savedRunTime = serverRunTime;
                            sessionStartTime = Date.now();
                        }
                    }
                }
            } catch (error) {
                console.error('Error fetching metrics:', error);
            }
        }

        // Function to update time continuously (ticks up locally)
        function updateTime() {
            if (sessionStartTime) {
                const currentTime = Date.now();
                const elapsedSinceUpdate = Math.floor((currentTime - sessionStartTime) / 1000);
                const totalSeconds = savedRunTime + elapsedSinceUpdate;
                document.getElementById('time-metric').textContent = `Time: ${formatTime(totalSeconds)}`;
            } else {
                // No session started yet - show 00:00:00
                document.getElementById('time-metric').textContent = `Time: 00:00:00`;
            }
        }
        
        // Poll for metrics updates - reduced frequency for better performance
        console.log('[Stream] Starting polling intervals...');
        setInterval(() => {
            console.log('[Stream] Polling metrics...');
            updateMetrics();
        }, 2000);  // Update metrics every 2 seconds
        setInterval(updateTime, 500);  // Update timer every 500ms
        updateMetrics();  // Initial metrics load
        console.log('[Stream] Initial metrics loaded');

        // Connect to WebSocket for real-time frame streaming (no polling needed!)
        connectFrameWebSocket();

        // Streaming agent thinking using Server-Sent Events
        let streamingSource = null;
        let currentMessage = null;
        let isMessageComplete = true;
        
        function initializeAgentStreaming() {
            const agentThinkingDiv = document.getElementById('agent-thinking');
            
            // Close existing connection if any
            if (streamingSource) {
                streamingSource.close();
            }
            
            // Create new EventSource connection
            streamingSource = new EventSource(`${serverUrl}/agent_stream`);
            
            streamingSource.onopen = function(event) {
                console.log('Agent streaming connected');
                agentThinkingDiv.innerHTML = '<div class="status-message">Agent streaming connected...</div>';
            };
            
            streamingSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.error) {
                        console.error('Streaming error:', data.error);
                        return;
                    }
                    
                    // Ignore heartbeat messages
                    if (data.heartbeat) {
                        return;
                    }
                    
                    // Only process new messages
                    if (!data.is_new) {
                        return;
                    }
                    
                    console.log('New agent message received:', data.step);
                    
                    // Create new message element
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'llm-entry streaming';
                    messageDiv.innerHTML = `
                        <div class="llm-step">Step ${data.step}:</div>
                        <div class="llm-message" id="streaming-message-${data.step}-${Date.now()}"></div>
                        <div class="llm-meta">${data.type} (${data.duration?.toFixed(2)}s)</div>
                    `;
                    
                    // Add to container
                    agentThinkingDiv.appendChild(messageDiv);

                    // Limit DOM size - keep only last 20 messages for performance
                    const maxMessages = 20;
                    const messages = agentThinkingDiv.querySelectorAll('.llm-entry');
                    if (messages.length > maxMessages) {
                        // Remove oldest messages
                        const toRemove = messages.length - maxMessages;
                        for (let i = 0; i < toRemove; i++) {
                            messages[i].remove();
                        }
                    }

                    // Display response text with smooth streaming (optimized for performance)
                    const messageElement = messageDiv.querySelector('.llm-message');
                    const responseText = data.response || '';

                    // Streaming animation that batches updates to avoid FPS drops
                    let charIndex = 0;
                    const charsPerFrame = 5; // Show 5 characters per frame for smooth streaming
                    const frameDelay = 16; // ~60 FPS (16ms per frame)

                    function streamChunk() {
                        if (charIndex < responseText.length) {
                            // Add multiple characters at once (batched update)
                            const nextChunk = responseText.substring(charIndex, charIndex + charsPerFrame);
                            messageElement.textContent += nextChunk;
                            charIndex += charsPerFrame;

                            // Use requestAnimationFrame for smooth, FPS-friendly updates
                            requestAnimationFrame(() => {
                                // Only scroll every few frames to reduce layout thrashing
                                if (charIndex % (charsPerFrame * 3) === 0) {
                                    agentThinkingDiv.scrollTop = agentThinkingDiv.scrollHeight;
                                }
                                setTimeout(streamChunk, frameDelay);
                            });
                        } else {
                            // Message complete - final scroll
                            agentThinkingDiv.scrollTop = agentThinkingDiv.scrollHeight;
                            messageDiv.classList.remove('streaming');
                            messageDiv.classList.add('complete');
                        }
                    }

                    streamChunk();
                    
                } catch (error) {
                    console.error('Error parsing streaming data:', error);
                }
            };
            
            streamingSource.onerror = function(event) {
                console.error('Agent streaming error:', event);
                agentThinkingDiv.innerHTML = '<div class="error-message">Agent streaming disconnected. Retrying...</div>';
                
                // Retry connection after delay
                setTimeout(() => {
                    initializeAgentStreaming();
                }, 5000);
            };
        }
        
        // Fallback function for non-streaming updates
        async function updateAgentThinking() {
            // Only use fallback if streaming is not available
            if (streamingSource && streamingSource.readyState === EventSource.OPEN) {
                return;
            }
            
            try {
                const response = await fetch(`${serverUrl}/agent`);
                const data = await response.json();
                
                const agentThinkingDiv = document.getElementById('agent-thinking');
                
                if (data.recent_interactions && data.recent_interactions.length > 0) {
                    // Format all LLM interactions in condensed format: "Step X: <msg>"
                    let html = '';
                    data.recent_interactions.forEach((interaction, index) => {
                        // Calculate step number based on current step and interaction index
                        const baseStep = data.current_step || 0;
                        const stepNumber = baseStep;
                        
                        // Trim whitespace from the response
                        const trimmedResponse = interaction.response.trim();
                        
                        html += `<div class="llm-entry complete">
                            <div class="llm-step">Step ${stepNumber}:</div>
                            <div class="llm-message">${trimmedResponse}</div>
                        </div>`;
                    });
                    agentThinkingDiv.innerHTML = html;
                    
                    // Auto-scroll to bottom to show most recent
                    agentThinkingDiv.scrollTop = agentThinkingDiv.scrollHeight;
                } else {
                    agentThinkingDiv.textContent = data.current_thought || 'No recent LLM interactions';
                }
                
            } catch (error) {
                console.error('Error fetching agent thinking:', error);
                document.getElementById('agent-thinking').textContent = 'Error loading agent thinking';
            }
        }

        // Function to fetch and update recent actions
        let lastButtonCount = 0;
        let lastButtonData = '';
        
        async function updateRecentActions() {
            try {
                const response = await fetch(`${serverUrl}/recent_actions`);
                const data = await response.json();
                
                const actionQueue = document.getElementById('action-queue');
                
                // Get up to last 20 button presses (or fewer if less available)
                const recentButtons = data.recent_buttons.slice(-20);
                
                // Create a signature of current buttons for change detection
                const currentSignature = recentButtons.map(b => `${b.button}:${b.timestamp}`).join('|');
                
                // Only update if there are changes
                if (currentSignature === lastButtonData && recentButtons.length === lastButtonCount) {
                    return; // No changes, don't update
                }
                
                lastButtonData = currentSignature;
                lastButtonCount = recentButtons.length;
                
                actionQueue.innerHTML = ''; // Clear existing buttons
                
                // Only show actual buttons (no empty slots)
                if (recentButtons.length === 0) {
                    const emptyMessage = document.createElement('div');
                    emptyMessage.style.color = '#666';
                    emptyMessage.style.fontStyle = 'italic';
                    emptyMessage.textContent = 'NO_RECENT_ACTIONS';
                    actionQueue.appendChild(emptyMessage);
                    return;
                }
                
                recentButtons.forEach((buttonData, index) => {
                    const button = document.createElement('div');
                    button.className = 'action-button';
                    button.textContent = buttonData.button;
                    
                    // Calculate age-based opacity (newer = more opaque)
                    const age = recentButtons.length - index - 1; // 0 = newest
                    const maxAge = Math.min(recentButtons.length - 1, 19); // Handle fewer than 20 buttons
                    const opacity = maxAge > 0 ? Math.max(0.3, 1.0 - (age / maxAge) * 0.7) : 1.0;
                    button.style.opacity = opacity;
                    
                    // Highlight the most recent button
                    if (index === recentButtons.length - 1) {
                        button.classList.add('newest');
                    }
                    
                    actionQueue.appendChild(button);
                });
                
            } catch (error) {
                console.error('Error fetching recent actions:', error);
            }
        }

        // Function to fetch and update objectives (categorized mode)
        async function updateObjectives() {
            try {
                const response = await fetch(`${serverUrl}/milestones`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                
                console.log('Milestone data received:', data); // Debug log

                // Update milestone list - GET ELEMENT FIRST!
                const milestonesList = document.getElementById('milestones-list');
                milestonesList.innerHTML = '';

                // Check if we're in categorized mode
                if (data.objectives && data.objectives.mode === 'categorized') {
                    // Update progress bar for categorized mode
                    const storyStatus = data.objectives.categorized_status?.story;
                    if (storyStatus) {
                        document.getElementById('milestone-count').textContent = `STORY ${storyStatus.current_index + 1}/${storyStatus.total}`;
                        document.getElementById('milestone-progress-fill').style.width = `${(storyStatus.current_index / storyStatus.total) * 100}%`;
                    }
                    // NEW: 3-column categorized layout
                    const container = document.createElement('div');
                    container.className = 'objectives-3col';

                    // Helper function to create a column
                    function createColumn(categoryName, objectives, status) {
                        const column = document.createElement('div');
                        column.className = `objective-column ${categoryName.toLowerCase()}`;

                        const header = document.createElement('div');
                        header.className = 'objective-column-header';
                        const prefix = categoryName === 'Story' ? '[STORY]' : categoryName === 'Battling' ? '[BATTLE]' : '[DYNAMIC]';
                        header.textContent = prefix;
                        if (status) {
                            header.textContent += ` ${status.current_index + 1}/${status.total}`;
                        }
                        column.appendChild(header);

                        if (objectives && objectives.length > 0) {
                            objectives.slice(0, 6).forEach(obj => {  // Max 6 entries per column
                                const entry = document.createElement('div');
                                entry.className = 'objective-entry';
                                if (obj.current) {
                                    entry.classList.add('current');
                                } else if (obj.completed) {
                                    entry.classList.add('completed');
                                }

                                const id = document.createElement('span');
                                id.className = 'objective-id';
                                id.textContent = obj.id;

                                const desc = document.createElement('span');
                                desc.textContent = obj.description; // Show full description

                                entry.appendChild(id);
                                entry.appendChild(desc);

                                if (obj.completed) {
                                    const check = document.createElement('span');
                                    check.style.color = '#666';
                                    check.style.marginLeft = '4px';
                                    check.textContent = '[OK]';
                                    entry.appendChild(check);
                                }

                                column.appendChild(entry);
                            });
                        } else {
                            const empty = document.createElement('div');
                            empty.style.color = '#666';
                            empty.style.fontStyle = 'italic';
                            empty.style.fontSize = '9px';
                            empty.style.marginTop = '8px';
                            empty.textContent = 'No objectives';
                            column.appendChild(empty);
                        }

                        return column;
                    }

                    // Create 3 columns
                    container.appendChild(createColumn('Story', data.objectives.story, data.objectives.categorized_status?.story));
                    container.appendChild(createColumn('Battling', data.objectives.battling, data.objectives.categorized_status?.battling));
                    container.appendChild(createColumn('Dynamics', data.objectives.dynamics, data.objectives.categorized_status?.dynamics));

                    milestonesList.appendChild(container);

                } else {
                    // LEGACY MODE: Display objectives and milestones the old way

                    // Update progress bar for legacy mode
                    const recentCount = Math.min(data.completed, 8);
                    document.getElementById('milestone-count').textContent = `${recentCount}/${data.completed} RECENT`;
                    document.getElementById('milestone-progress-fill').style.width = `${data.progress * 100}%`;

                    if (data.objectives && data.objectives.current) {
                        // Display current objective first if available
                        const currentObj = data.objectives.current;
                        const item = document.createElement('div');
                        item.className = 'milestone-item';
                        item.style.borderLeft = '2px solid #ffa500';
                        item.style.paddingLeft = '5px';
                        item.style.marginBottom = '10px';

                        // Truncate long descriptions
                        const desc = currentObj.description.length > 50 ?
                            currentObj.description.substring(0, 50) + '...' :
                            currentObj.description;

                        item.innerHTML = `
                            <span class="milestone-category progress">NOW</span>
                            <span class="milestone-name newest">${desc}</span>
                            <span style="color: #ffa500;">[${currentObj.index + 1}/${data.objectives.total_in_sequence}]</span>
                        `;
                        milestonesList.appendChild(item);
                    }

                    // Display recently completed objectives
                    if (data.objectives && data.objectives.recently_completed && data.objectives.recently_completed.length > 0) {
                        data.objectives.recently_completed.reverse().forEach((obj, index) => {
                            const item = document.createElement('div');
                            item.className = 'milestone-item';

                            // Truncate long descriptions
                            const desc = obj.description.length > 50 ?
                                obj.description.substring(0, 50) + '...' :
                                obj.description;

                            const ageClass = index === 0 ? 'recent' : 'older';

                            item.innerHTML = `
                                <span class="milestone-category progress">OBJ</span>
                                <span class="milestone-name ${ageClass}">${desc}</span>
                                <span class="milestone-check">[OK]</span>
                            `;
                            milestonesList.appendChild(item);
                        });
                    }

                    // Filter and show only recent completed milestones (max 4 to leave room for objectives)
                    if (data.milestones && data.milestones.length > 0) {
                        // Get only completed milestones, sorted by timestamp (most recent first)
                        const completedMilestones = data.milestones
                            .filter(milestone => milestone.completed)
                            .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
                            .slice(0, 4); // Show max 4 recent milestones (reduced from 8 to make room for objectives)

                        if (completedMilestones.length > 0) {
                            completedMilestones.forEach((milestone, index) => {
                                const item = document.createElement('div');
                                item.className = 'milestone-item';

                                const categoryClass = milestone.category || 'basic';
                                const categoryDisplay = categoryClass.toUpperCase().substring(0, 4);

                                // Add age indicator for visual feedback
                                const ageClass = index === 0 ? 'newest' : index < 2 ? 'recent' : 'older';

                                item.innerHTML = `
                                    <span class="milestone-category ${categoryClass}">${categoryDisplay}</span>
                                    <span class="milestone-name ${ageClass}">${milestone.name}</span>
                                    <span class="milestone-check">[OK]</span>
                                `;
                                milestonesList.appendChild(item);
                            });
                        } else if (!data.objectives || !data.objectives.current) {
                            // Show message if no completed milestones and no current objective
                            const noCompleted = document.createElement('div');
                            noCompleted.style.color = '#666';
                            noCompleted.style.fontStyle = 'italic';
                            noCompleted.style.textAlign = 'center';
                            noCompleted.textContent = 'NO_MILESTONES_COMPLETED';
                            milestonesList.appendChild(noCompleted);
                        }
                    } else if (!data.objectives || !data.objectives.current) {
                        // Show message if no milestones and no current objective
                        const noMilestones = document.createElement('div');
                        noMilestones.style.color = '#666';
                        noMilestones.style.fontStyle = 'italic';
                        noMilestones.textContent = 'NO_MILESTONES_LOADED';
                        milestonesList.appendChild(noMilestones);
                    }

                } // End of legacy mode block

                // Add debug info if available - AFTER milestones/objectives
                if (data.current_location || data.badges !== undefined) {
                    const debugInfo = document.createElement('div');
                    debugInfo.style.fontSize = '10px';
                    debugInfo.style.color = '#666';
                    debugInfo.style.marginTop = '5px';
                    
                    let debugText = `
                        LOC: ${data.current_location || 'UNKNOWN'} | 
                        BADGES: ${data.badges || 0} | 
                        SEEN: ${data.pokedex_seen || 0} | 
                        CAUGHT: ${data.pokedex_caught || 0} | 
                        PARTY: ${data.party_size || 0}
                    `;
                    
                    // Add tracking system info if available
                    if (data.tracking_system) {
                        debugText += `<br/>TRACKING: ${data.tracking_system.toUpperCase()}`;
                        if (data.milestone_file) {
                            debugText += ` | FILE: ${data.milestone_file}`;
                        }
                    }
                    
                    debugInfo.innerHTML = debugText;
                    
                    // Remove old debug info
                    const oldDebug = milestonesList.querySelector('.debug-info');
                    if (oldDebug) oldDebug.remove();
                    
                    debugInfo.className = 'debug-info';
                    milestonesList.appendChild(debugInfo);
                }
                
            } catch (error) {
                console.error('Error fetching milestones:', error);
                // Show error in the UI
                const milestonesList = document.getElementById('milestones-list');
                milestonesList.innerHTML = `<div style="color: #ff6177;">ERROR: ${error.message}</div>`;
                
                // Also update the count to show error state
                document.getElementById('milestone-count').textContent = 'ERROR';
                document.getElementById('milestone-progress-fill').style.width = '0%';
            }
        }

        // Function to fetch and update party status
        async function updatePartyStatus() {
            try {
                const response = await fetch(`${serverUrl}/state`);
                const data = await response.json();

                const partyContainer = document.getElementById('party-horizontal');
                partyContainer.innerHTML = '';

                if (data.player && data.player.party && data.player.party.length > 0) {
                    data.player.party.forEach((pokemon, index) => {
                        if (pokemon && pokemon.species_name && pokemon.species_name.trim() !== '') {
                            const pokemonDiv = document.createElement('div');
                            pokemonDiv.className = 'party-box';
                            if (index === 0) pokemonDiv.classList.add('active');

                            // Check if it's an egg
                            const isEgg = pokemon.is_egg || false;

                            const hpPercent = pokemon.current_hp && pokemon.max_hp ?
                                (pokemon.current_hp / pokemon.max_hp) * 100 : 0;

                            let hpClass = 'hp-fill';
                            if (hpPercent < 25) hpClass += ' critical';
                            else if (hpPercent < 50) hpClass += ' low';

                            // Display "EGG" for eggs, otherwise use nickname or species name
                            const displayName = isEgg ? 'EGG' :
                                (pokemon.nickname && pokemon.nickname.trim() !== '') ?
                                pokemon.nickname.toUpperCase() : pokemon.species_name.toUpperCase();

                            // Use egg sprite for eggs, otherwise use regular Pokemon sprites
                            const spriteUrl = isEgg ?
                                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/egg.png' :
                                (pokemon.species_name ?
                                `https://play.pokemonshowdown.com/sprites/ani/${pokemon.species_name.toLowerCase().replace(/[^a-z0-9]/g, '')}.gif` : '');

                            // Fallback to PokeAPI static Emerald sprites (use species_id = National Dex)
                            const fallbackSpriteUrl = isEgg ?
                                'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/egg.png' :
                                (pokemon.species_id ?
                                `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.species_id}.png` : '');

                            const level = isEgg ? '??' : (pokemon.level || '??');

                            pokemonDiv.innerHTML = `
                                <div class="party-sprite">
                                    ${spriteUrl ? `<img src="${spriteUrl}" onerror="this.src='${fallbackSpriteUrl}'" alt="${displayName}">` : '<span style="color: #666;">?</span>'}
                                </div>
                                <span class="pokemon-name">${displayName}</span>
                                <span class="pokemon-level">Lv.${level}</span>
                                <div class="pokemon-hp">
                                    <div class="hp-bar">
                                        <div class="${hpClass}" style="width: ${hpPercent}%"></div>
                                    </div>
                                    <div class="hp-text">${pokemon.current_hp || '??'}/${pokemon.max_hp || '??'}</div>
                                </div>
                            `;

                            partyContainer.appendChild(pokemonDiv);
                        }
                    });
                } else {
                    // Fallback if no party data
                    partyContainer.innerHTML = `
                        <div class="party-box">
                            <div class="party-sprite">
                                <span style="color: #666;">?</span>
                            </div>
                            <span class="pokemon-name">NO_PARTY_DATA</span>
                            <span class="pokemon-level">Lv.--</span>
                            <div class="pokemon-hp">
                                <div class="hp-bar">
                                    <div class="hp-fill" style="width: 0%"></div>
                                </div>
                                <div class="hp-text">--/--</div>
                            </div>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Error fetching party status:', error);
            }
        }

        // Function to fetch and update map visualization
        async function updateMapVisualization() {
            try {
                // Add cache busting to ensure fresh data
                const response = await fetch(`${serverUrl}/state?t=${Date.now()}`);
                const data = await response.json();

                const mapContainer = document.getElementById('map-visualization');

                if (data.map && data.map.visual_map) {
                    // Filter out rows that only contain numbers, minus, space, #, and N
                    let lines = data.map.visual_map.split('\n');
                    lines = lines.filter(line => {
                        const cleanLine = line.trim();
                        if (cleanLine === '') return false; // Skip empty lines

                        // Skip rows that only contain: numbers, minus, space, #, and N
                        const onlyBoringChars = /^[\d\-\s#N]+$/.test(cleanLine);
                        return !onlyBoringChars;
                    });

                    if (lines.length > 0) {
                        mapContainer.textContent = lines.join('\n');
                    } else {
                        mapContainer.textContent = 'NO_MAP_DATA';
                    }
                } else {
                    mapContainer.textContent = 'NO_MAP_DATA';
                }

            } catch (error) {
                console.error('Error fetching map visualization:', error);
                document.getElementById('map-visualization').textContent = 'ERROR_LOADING_MAP';
            }
        }

        // Frame updates are now handled by WebSocket (real-time push)
        // No polling needed!

        // Initialize streaming for agent thinking
        initializeAgentStreaming();

        // Set up periodic updates for other components - optimized frequencies
        setInterval(() => {
            updateRecentActions();
            updatePartyStatus();
            updateMapVisualization();
        }, 2000); // Update every 2 seconds (reduced from 1s)

        // Poll objectives every 10 seconds
        setInterval(() => {
            updateObjectives();
        }, 10000);

        // Call the update functions initially (except agent thinking which streams)
        updateRecentActions();
        updateObjectives(); // Update objectives display
        updatePartyStatus();
        updateMapVisualization();
    </script>
